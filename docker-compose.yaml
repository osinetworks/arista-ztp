services:
  ztp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: ztp-server:latest
    container_name: ztp-server
    restart: unless-stopped

    # Host networking gives dnsmasq full access to the physical interface
    # for DHCP. Use bridge mode only if you know what you're doing.
    network_mode: host

    environment:
      # --- Read from .env ---
      - ZTP_SERVER_IP=${SERVER_IP}
      - ZTP_PORT=${HTTP_PORT}
      - ZTP_INTERFACE=${INTERFACE}
      - PRIORITY_WAIT_TIMEOUT=${PRIORITY_WAIT_TIMEOUT}
      - LOG_LEVEL=${LOG_LEVEL}

      # dnsmasq template substitution values (used by entrypoint.sh)
      - DHCP_RANGE_START=${DHCP_RANGE_START}
      - DHCP_RANGE_END=${DHCP_RANGE_END}
      - DHCP_SUBNET=${DHCP_SUBNET}
      - DHCP_LEASE=${DHCP_LEASE}
      - DNS_SERVER=${DNS_SERVER}

      # --- Fixed values (not network-specific) ---
      - ZTP_HOST=0.0.0.0
      - ZTP_BASE_DIR=/var/www/ztp
      - INVENTORY_PATH=/var/www/ztp/config/inventory.yaml
      - LOG_DIR=/var/www/ztp/logs

    volumes:
      # Inventory config (editable without rebuild)
      - ./config/inventory.yaml:/var/www/ztp/config/inventory.yaml

      # Bootstrap scripts (editable without rebuild)
      - ./scripts/bootstrap_arista:/var/www/ztp/bootstrap_arista
      - ./scripts/bootstrap_cisco:/var/www/ztp/bootstrap_cisco

      # Switch-specific and generic configs
      - ./configs:/var/www/ztp/configs

      # Firmware images (large files, keep outside image)
      - ./firmware:/var/www/ztp/firmware

      # Persistent logs
      - ./logs:/var/www/ztp/logs

    # Required for dnsmasq to serve DHCP
    cap_add:
      - NET_ADMIN
      - NET_RAW

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${HTTP_PORT}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
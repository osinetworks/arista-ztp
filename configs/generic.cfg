! ============================================================
! generic.cfg - Fallback startup config for unregistered switches
! Applied when serial number is not found in inventory.
! ============================================================

hostname arista-ztp-unknown

! Management interface
interface Management1
   ip address dhcp
   no shutdown

! SSH access
management ssh
   idle-timeout 30
   authentication mode keyboard-interactive

! AAA
aaa authorization exec default local
username admin privilege 15 secret arista

! Basic logging
logging on
logging level informational

! NTP
ntp server 216.239.35.0 prefer

! End
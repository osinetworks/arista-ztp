! ============================================================
! SN0002ABCD.cfg - Core Switch Rack a1
! ============================================================

hostname core-sw-rack-a1

interface Management1
   ip address 192.168.100.11/24
   no shutdown

interface Ethernet1
   description "Uplink to spine"
   no switchport
   ip address 10.0.0.1/31
   no shutdown

interface Ethernet2
   description "Leaf Link"
   switchport mode trunk

ip routing

username admin privilege 15 secret arista

management ssh
   idle-timeout 30

logging on
ntp server 216.239.35.0 prefer
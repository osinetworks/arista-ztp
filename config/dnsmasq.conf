# ============================================================
# dnsmasq configuration for Multi-Vendor ZTP Server
# Serves different bootstrap URLs to Arista and Cisco switches
# based on DHCP Option 60 (Vendor Class Identifier).
#
# NOTE: interface= is set automatically at container startup
#       via /tmp/dnsmasq-interface.conf
# ============================================================

# bind-interfaces is intentionally omitted - it causes
# "unknown interface" errors when the interface hasn't
# fully initialized yet. dnsmasq will bind to all interfaces
# and filter by the interface= directive instead.

# DHCP range and lease time
dhcp-range=192.168.100.20,192.168.100.100,255.255.255.0,1h

# Default gateway
dhcp-option=3,192.168.100.1

# DNS servers
dhcp-option=6,1.1.1.1,8.8.8.8

# ============================================================
# Vendor-specific Option 67 (Bootstrap URL)
# dnsmasq matches Option 60 (Vendor Class) sent by the switch
# and returns the appropriate bootstrap script URL.
#
# Arista sends Option 60: "Arista Networks"
# Cisco  sends Option 60: "ciscopnp" (IOS XE 16.x+)
#                      or "Cisco Systems" (older IOS XE)
# ============================================================

# Arista switches — serve Arista bootstrap
dhcp-vendorclass=set:arista,Arista Networks
dhcp-option=tag:arista,67,http://192.168.100.1:8080/bootstrap/arista

# Cisco switches (IOS XE 16.x+)
dhcp-vendorclass=set:cisco_pnp,ciscopnp
dhcp-option=tag:cisco_pnp,67,http://192.168.100.1:8080/bootstrap/cisco

# Cisco switches (older IOS XE / fallback vendor string)
dhcp-vendorclass=set:cisco_sys,Cisco Systems
dhcp-option=tag:cisco_sys,67,http://192.168.100.1:8080/bootstrap/cisco

# Fallback for unknown vendors — serve Arista bootstrap by default
dhcp-option=67,http://192.168.100.1:8080/bootstrap/arista

# Logging
log-dhcp
log-queries

# DHCP lease file
dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.leases

# Disable DNS (pure DHCP mode)
port=0
